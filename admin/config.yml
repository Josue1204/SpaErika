backend:
  name: git-gateway
  branch: main

media_folder: "images" # Aquí se guardarán las fotos que subas
public_folder: "/images"

collections:
  - name: "configuracion"
    label: "Configuración de la Web"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "Contenido General"
        file: "data/config.json"
        fields:
          - {label: "🏨 Nombre del Spa", name: "titulo", widget: "string"}
          - {label: "👤 Biografía (Sobre Mí)", name: "sobre_mi", widget: "text"}
          - {label: "💵 Precio Masaje Básico", name: "precio_basico", widget: "number"}
          - {label: "💎 Precio Masaje Premium", name: "precio_premium", widget: "number"}
          - label: "🎥 Galería de Videos"
            name: "videos"
            widget: "list"
            field: {label: "Link de YouTube o TikTok", name: "video", widget: "string"}
          - label: "📸 Galería de Fotos"
            name: "fotos"
            widget: "list"
            field: {label: "Subir Imagen", name: "imagen", widget: "image"}
