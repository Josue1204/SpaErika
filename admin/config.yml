backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "configuracion"
    label: "Configuración de la Web"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "Contenido General"
        file: "data/config.json"
        fields:
          - { label: "🏨 Título principal ES", name: "titulo", widget: "string" }
          - { label: "🏨 Main title EN", name: "titulo_en", widget: "string", required: false }

          - { label: "🔎 Meta descripción ES", name: "meta_descripcion", widget: "text", required: false }
          - { label: "🔎 Meta description EN", name: "meta_descripcion_en", widget: "text", required: false }

          - { label: "🦸 Hero título ES", name: "hero_titulo", widget: "text", required: false }
          - { label: "🦸 Hero title EN", name: "hero_titulo_en", widget: "text", required: false }

          - { label: "📝 Hero subtítulo ES", name: "hero_subtitulo", widget: "string", required: false }
          - { label: "📝 Hero subtitle EN", name: "hero_subtitulo_en", widget: "string", required: false }

          - { label: "📱 Número de WhatsApp", name: "whatsapp", widget: "string", hint: "Ejemplo: 13106291978" }
          - { label: "☎️ Número de teléfono", name: "telefono", widget: "string", required: false, hint: "Ejemplo: 13106291978" }

          - { label: "👤 Sobre mí ES", name: "sobre_mi", widget: "text" }
          - { label: "👤 About me EN", name: "sobre_mi_en", widget: "text", required: false }

          - { label: "🖼️ Imagen hero", name: "imagen_hero", widget: "image", required: false }
          - { label: "📸 Imagen sobre mí", name: "imagen_sobre_mi", widget: "image", required: false }

          - { label: "📢 Mostrar banner", name: "mostrar_banner", widget: "boolean", default: false, required: false }
          - { label: "🪧 Texto del banner ES", name: "banner_texto", widget: "string", required: false }
          - { label: "🪧 Banner text EN", name: "banner_texto_en", widget: "string", required: false }

          - { label: "💲 Mostrar precios", name: "mostrar_precios", widget: "boolean", default: true, required: false }
          - { label: "💬 Mostrar testimonios", name: "mostrar_testimonios", widget: "boolean", default: true, required: false }

          - { label: "📍 Texto ubicación ES", name: "ubicacion_texto", widget: "string", required: false }
          - { label: "📍 Location text EN", name: "ubicacion_texto_en", widget: "string", required: false }
          - { label: "🗺️ Query Google Maps", name: "ubicacion_mapa_query", widget: "string", required: false, hint: "Ejemplo: 4716 Lomita St, Los Angeles, CA 90019" }

          - { label: "🧾 Título contacto ES", name: "contacto_titulo", widget: "string", required: false }
          - { label: "🧾 Contact title EN", name: "contacto_titulo_en", widget: "string", required: false }
          - { label: "📝 Texto contacto ES", name: "contacto_texto", widget: "text", required: false }
          - { label: "📝 Contact text EN", name: "contacto_texto_en", widget: "text", required: false }

          - label: "🩺 Condiciones tratadas"
            name: "condiciones"
            widget: "list"
            required: false
            fields:
              - { label: "Título ES", name: "titulo", widget: "string" }
              - { label: "Title EN", name: "titulo_en", widget: "string", required: false }
              - { label: "Descripción ES", name: "descripcion", widget: "text", required: false }
              - { label: "Description EN", name: "descripcion_en", widget: "text", required: false }

          - label: "🕒 Horarios"
            name: "horarios"
            widget: "list"
            required: false
            summary: "{{fields.dia}} - {{fields.horario}}"
            fields:
              - { label: "Día ES", name: "dia", widget: "string" }
              - { label: "Day EN", name: "dia_en", widget: "string", required: false }
              - { label: "Horario ES", name: "horario", widget: "string" }
              - { label: "Hours EN", name: "horario_en", widget: "string", required: false }

          - label: "🛎️ Servicios"
            name: "servicios"
            widget: "list"
            required: false
            fields:
              - { label: "Título ES", name: "titulo", widget: "string" }
              - { label: "Title EN", name: "titulo_en", widget: "string", required: false }
              - { label: "Descripción ES", name: "descripcion", widget: "text" }
              - { label: "Description EN", name: "descripcion_en", widget: "text", required: false }

          - label: "💳 Planes"
            name: "planes"
            widget: "list"
            required: false
            summary: "{{fields.titulo}} - {{fields.duracion}}"
            fields:
              - { label: "Título ES", name: "titulo", widget: "string" }
              - { label: "Title EN", name: "titulo_en", widget: "string", required: false }
              - { label: "Precio", name: "precio", widget: "number", required: false, value_type: "int" }
              - { label: "Duración", name: "duracion", widget: "string", required: false, default: "60 MIN" }
              - { label: "Descripción ES", name: "descripcion", widget: "text", required: false }
              - { label: "Description EN", name: "descripcion_en", widget: "text", required: false }
              - { label: "Texto botón ES", name: "texto_boton", widget: "string", required: false, default: "RESERVAR" }
              - { label: "Button text EN", name: "texto_boton_en", widget: "string", required: false, default: "BOOK NOW" }

          - label: "⭐ Testimonios"
            name: "testimonios"
            widget: "list"
            required: false
            summary: "{{fields.nombre}}"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Comentario ES", name: "comentario", widget: "text" }
              - { label: "Comment EN", name: "comentario_en", widget: "text", required: false }
              - { label: "Estrellas (1 a 5)", name: "estrellas", widget: "number", required: false, default: 5, value_type: "int", min: 1, max: 5 }

          - label: "🎥 Galería de Videos"
            name: "videos"
            widget: "list"
            required: false
            field:
              { label: "Link de YouTube o TikTok", name: "video", widget: "string" }

          - label: "📸 Galería de Fotos"
            name: "fotos"
            widget: "list"
            required: false
            fields:
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Alt ES", name: "alt_es", widget: "string", required: false }
              - { label: "Alt EN", name: "alt_en", widget: "string", required: false }

          - { label: "📷 Link de Instagram", name: "instagram_url", widget: "string", required: false, hint: "Ejemplo: https://instagram.com/tu_cuenta" }
          - { label: "📘 Link de Facebook", name: "facebook_url", widget: "string", required: false, hint: "Ejemplo: https://facebook.com/tu_pagina" }
